name: Download NAZK declarations

on:
  workflow_dispatch:

env:
  NAZK_API_URL: public-api.nazk.gov.ua
  EXCEL_FILE: organizations.xlsx

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Check Excel file exists
        run: test -f "$EXCEL_FILE" || (echo "Excel not found: $EXCEL_FILE" && exit 1)

      - name: Run parser
        run: python main.py

      - name: Upload JSON results
        uses: actions/upload-artifact@v4
        with:
          name: nazk-output-${{ github.run_number }}
          path: output/
          if-no-files-found: error
          retention-days: 30
