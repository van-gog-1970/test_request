name: Interactive Python Run

on:
  workflow_dispatch:
    inputs:
      user_message:
        description: 'Що ви хочете записати у файл?'
        required: true
        default: 'Привіт із GitHub Actions!'

jobs:
  run-code:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Передаємо введене вами повідомлення як аргумент для скрипта
    - name: Run Python script
      run: python script.py "${{ github.event.inputs.user_message }}"

    # Зберігаємо оновлений файл назад у репозиторій
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add user_answers.txt
        git commit -m "Додано відповідь користувача [skip ci]" || echo "Немає змін"
        git push
